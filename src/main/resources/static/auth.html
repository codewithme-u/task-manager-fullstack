<!DOCTYPE html>
<html>
<head>
    <title>Auth</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="bg-dark d-flex justify-content-center align-items-center vh-100">

<div class="card shadow-lg p-4" style="width: 420px; border-radius: 15px;">

    <h3 class="text-center mb-3"> Task Manager</h3>

    <!-- Tabs -->
    <ul class="nav nav-pills mb-3" id="pills-tab">
        <li class="nav-item w-50">
            <button class="nav-link active w-100" data-bs-toggle="pill" data-bs-target="#loginTab">Login</button>
        </li>
        <li class="nav-item w-50">
            <button class="nav-link w-100" data-bs-toggle="pill" data-bs-target="#signupTab">Signup</button>
        </li>
    </ul>

    <div class="tab-content">

        <!-- LOGIN -->
        <div class="tab-pane fade show active" id="loginTab">

            <input id="loginEmail" class="form-control mb-2" placeholder="Email">
            <input id="loginPassword" type="password" class="form-control mb-3" placeholder="Password">

            <button class="btn btn-success w-100" onclick="login()">Login</button>

        </div>

        <!-- SIGNUP -->
        <div class="tab-pane fade" id="signupTab">

            <input id="name" class="form-control mb-2" placeholder="Name">
            <input id="email" class="form-control mb-2" placeholder="Email">
            <input id="password" type="password" class="form-control mb-2" placeholder="Password">

            <select id="role" class="form-control mb-3">
                <option value="">Select Role</option>
                <option>ADMIN</option>
                <option>MEMBER</option>
            </select>

            <button class="btn btn-primary w-100" onclick="signup()">Create Account</button>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
localStorage.removeItem("user");

function signup() {

 const nameVal = document.getElementById("name").value;
 const emailVal = document.getElementById("email").value;
 const passwordVal = document.getElementById("password").value;
 const roleVal = document.getElementById("role").value;

 if (!nameVal || !emailVal || !passwordVal || !roleVal) {
     Swal.fire("Error", "All fields are required", "error");
     return;
 }

 fetch("/auth/signup", {
     method: "POST",
     headers: {"Content-Type": "application/json"},
     body: JSON.stringify({
         name: nameVal,
         email: emailVal,
         password: passwordVal,
         role: roleVal
     })
 })
 .then(res => res.json())
 .then(data => {
     if (data.message) {
         Swal.fire("Error", data.message, "error");
     } else {
         Swal.fire("Success", "Account created ", "success");
     }
 });
}

function login() {

 if (!loginEmail.value || !loginPassword.value) {
     Swal.fire("Error", "Email & Password required", "error");
     return;
 }

 fetch("/auth/login", {
     method: "POST",
     headers: {"Content-Type": "application/json"},
     body: JSON.stringify({
         email: loginEmail.value,
         password: loginPassword.value
     })
 })
 .then(async res => {
     const data = await res.json();

     if (!res.ok) {
         Swal.fire("Error", data.message || "Login failed", "error");
         return;
     }

     localStorage.setItem("user", JSON.stringify(data));

     Swal.fire("Success", "Login successful", "success")
     .then(() => {
         if (data.role === "ADMIN") {
             window.location.href = "admin.html";
         } else {
             window.location.href = "member.html";
         }
     });
 });
}
</script>

</body>
</html>
