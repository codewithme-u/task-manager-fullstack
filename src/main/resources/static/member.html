<!DOCTYPE html>
<html>
<head>
    <title>Member Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <div class="d-flex justify-content-between">
        <h3>Member Dashboard</h3>
        <button class="btn btn-danger" onclick="logout()">Logout</button>
    </div>

    <h5 id="welcome"></h5>

    <hr>
    
    <div class="row text-center mb-4">

    <div class="col-md-3">
        <div class="card p-3">
            <h6>Total</h6>
            <h4 id="total">0</h4>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card p-3">
            <h6>Done</h6>
            <h4 id="done">0</h4>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card p-3">
            <h6>In Progress</h6>
            <h4 id="inProgress">0</h4>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card p-3">
            <h6>Todo</h6>
            <h4 id="todo">0</h4>
        </div>
    </div>
    <div class="col-md-3">
    <div class="card p-3">
        <h6>Overdue</h6>
        <h4 id="overdue">0</h4>
    </div>
</div>
    

</div>



    <div class="row" id="taskList"></div>

</div>

<script>
const BASE = "http://localhost:8080";
const user = JSON.parse(localStorage.getItem("user"));

if (!user || user.role !== "MEMBER") {
    window.location.href = "auth.html";
}

welcome.innerText = "Welcome " + user.name;

function logout() {
    localStorage.removeItem("user");
    window.location.href = "auth.html";
}

function loadTasks() {
	fetch(BASE + "/tasks/user/" + user.id, {
	    headers: {
	        "userId": user.id
	    }
	})
    .then(res => res.json())
    .then(tasks => {

        if (!Array.isArray(tasks)) {
            console.error("API error:", tasks);
            taskList.innerHTML = `<div class="text-danger">Failed to load tasks</div>`;
            return;
        }
        
        calculateStats(tasks);
        taskList.innerHTML = "";
        

        if (tasks.length === 0) {
            taskList.innerHTML = `
                <div class="text-center text-muted">
                    <h5>No tasks assigned</h5>
                </div>
            `;
            return; 
        }

        const grouped = {};

        tasks.forEach(t => {
        	const projectName = t.project && t.project.name ? t.project.name : "No Project";

            if (!grouped[projectName]) {
                grouped[projectName] = [];
            }

            grouped[projectName].push(t);
        });

        Object.keys(grouped).forEach(project => {
        	if (currentProject && currentProject !== project) return;

            let taskHTML = "";

            grouped[project].forEach(t => {
                taskHTML += `
                	<div class="card mb-2 ${isOverdue(t) ? 'border-danger' : ''}">
                    <div class="card-body">

                        <div class="d-flex justify-content-between">
                            <strong>${t.title}</strong>

                            <span class="badge ${
                                t.status === 'DONE' ? 'bg-success' :
                                t.status === 'IN_PROGRESS' ? 'bg-warning' :
                                'bg-secondary'
                            }">
                                ${t.status}
                            </span>
                        </div>

                        <small class="text-muted">${t.description || ''}</small><br>

                        <small>
                            Priority:
                            <span class="badge ${
                                t.priority === 'HIGH' ? 'bg-danger' :
                                t.priority === 'MEDIUM' ? 'bg-warning' :
                                'bg-info'
                            }">
                                ${t.priority}
                            </span>
                        </small><br>

                        <small>Due: ${t.dueDate || 'N/A'}</small>

                        <select onchange="updateStatus(${t.id}, this.value)"
                                class="form-select form-select-sm mt-2">
                            <option ${t.status==='TODO'?'selected':''}>TODO</option>
                            <option ${t.status==='IN_PROGRESS'?'selected':''}>IN_PROGRESS</option>
                            <option ${t.status==='DONE'?'selected':''}>DONE</option>
                        </select>

                    </div>
                </div>
                `;
            });

            taskList.innerHTML += `
                <div class="col-md-6 mb-4">
                    <div class="card shadow-sm">
                        <div class="card-header bg-dark text-white">
                             ${project}
                        </div>
                        <div class="card-body">
                            ${taskHTML}
                        </div>
                    </div>
                </div>
            `;
        });
    });
}



function updateStatus(taskId, status) {

	fetch(BASE + "/tasks/" + taskId + "?status=" + status, {
	    method: "PUT",
	    headers: {
	        "userId": user.id
	    }
	})
    .then(() => {
        alert("Status updated");
        loadTasks();
    });
}

function calculateStats(tasks) {
    document.getElementById("total").innerText = tasks.length;

    document.getElementById("done").innerText =
        tasks.filter(t => t.status === "DONE").length;

    document.getElementById("inProgress").innerText =
        tasks.filter(t => t.status === "IN_PROGRESS").length;

    document.getElementById("todo").innerText =
        tasks.filter(t => t.status === "TODO").length;

    document.getElementById("overdue").innerText =
        tasks.filter(t => isOverdue(t)).length;
}

let currentProject = null;

function filterProject(name) {
    currentProject = name;
    loadTasks();
}


function isOverdue(t) {
    if (!t.dueDate) return false;

    const today = new Date().toISOString().split('T')[0];
    return t.dueDate < today && t.status !== "DONE";
}

loadTasks();




</script>

</body>
</html>
